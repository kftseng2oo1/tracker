<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>課堂問答記錄系統</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a1208">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="問答記錄">
<link rel="apple-touch-icon" href="icon-192x192.png">
<link rel="icon" type="image/svg+xml" href="icon.svg">

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1208;
    --paper: #f5f0e8;
    --aged: #e8dfc8;
    --accent: #c44b2a;
    --accent2: #3d7a5e;
    --accent3: #8b6914;
    --muted: #8a7a6a;
    --border: #c8b89a;
    --gold: #c8a84b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--paper); color: var(--ink);
    font-family: 'Noto Serif TC', serif; min-height: 100vh;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 27px, rgba(180,160,120,0.15) 28px),
      url("data:image/svg+xml,%3Csvg width='200' height='200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3CfeColorMatrix type='saturate' values='0'/%3E%3C/filter%3E%3Crect width='200' height='200' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  }
  header {
    background: var(--ink); color: var(--paper);
    padding: 14px 28px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 4px solid var(--accent);
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    gap: 12px; flex-wrap: wrap;
  }
  header h1 { font-size: 1.2rem; font-weight: 700; letter-spacing: 0.1em; white-space: nowrap; }
  .header-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .btn-header {
    display: flex; align-items: center; gap: 6px;
    padding: 7px 14px; border: 1.5px solid; cursor: pointer;
    font-family: 'Noto Serif TC', serif; font-size: 0.8rem;
    border-radius: 2px; transition: all 0.2s; white-space: nowrap;
  }
  .btn-import { border-color: var(--gold); color: var(--gold); background: transparent; }
  .btn-import:hover { background: var(--gold); color: var(--ink); }
  .btn-export-xlsx { border-color: var(--accent2); color: var(--accent2); background: transparent; }
  .btn-export-xlsx:hover { background: var(--accent2); color: white; }
  .btn-savedata { border-color: #6b7fd4; color: #6b7fd4; background: transparent; }
  .btn-savedata:hover { background: #6b7fd4; color: white; }
  .btn-loaddata { border-color: #9b6bcc; color: #9b6bcc; background: transparent; }
  .btn-loaddata:hover { background: #9b6bcc; color: white; }
  .btn-template { border-color: var(--muted); color: var(--muted); background: transparent; }
  .btn-template:hover { border-color: var(--paper); color: var(--paper); }
  .main-layout {
    display: grid; grid-template-columns: 290px 1fr;
    gap: 0; min-height: calc(100vh - 68px);
  }
  .sidebar {
    background: var(--aged); border-right: 2px solid var(--border);
    padding: 18px 14px; display: flex; flex-direction: column;
    gap: 10px; overflow-y: auto; max-height: calc(100vh - 68px);
  }
  .sidebar-section-title {
    font-size: 0.62rem; letter-spacing: 0.2em; color: var(--muted);
    text-transform: uppercase; font-family: 'JetBrains Mono', monospace;
    padding: 4px 0 6px; border-bottom: 1px solid var(--border);
  }
  .add-student-form { display: flex; gap: 6px; }
  .add-student-form input {
    flex: 1; padding: 7px 10px; border: 1.5px solid var(--border);
    background: var(--paper); color: var(--ink);
    font-family: 'Noto Serif TC', serif; font-size: 0.85rem;
    border-radius: 2px; outline: none; transition: border-color 0.2s;
  }
  .add-student-form input:focus { border-color: var(--accent); }
  .btn-add {
    background: var(--accent); color: white; border: none;
    padding: 7px 12px; cursor: pointer; font-size: 1.1rem;
    border-radius: 2px; transition: all 0.2s; font-weight: 600;
  }
  .btn-add:hover { background: #a33d21; transform: scale(1.05); }
  .student-list { display: flex; flex-direction: column; gap: 6px; }
  .student-chip {
    display: flex; align-items: center; justify-content: space-between;
    padding: 9px 11px; background: var(--paper); border: 1.5px solid var(--border);
    border-radius: 2px; cursor: pointer; transition: all 0.2s;
    position: relative; overflow: hidden;
  }
  .student-chip::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0;
    width: 3px; background: var(--border); transition: background 0.2s;
  }
  .student-chip:hover { border-color: var(--accent2); background: #edf5f0; }
  .student-chip:hover::before { background: var(--accent2); }
  .student-chip.active { border-color: var(--accent); background: #fdf0ec; }
  .student-chip.active::before { background: var(--accent); }
  .student-chip-info { display: flex; flex-direction: column; gap: 2px; }
  .student-name { font-size: 0.88rem; font-weight: 600; }
  .student-stats { font-family: 'JetBrains Mono', monospace; font-size: 0.62rem; color: var(--muted); }
  .chip-actions { display: flex; gap: 2px; }
  .btn-icon {
    background: none; border: none; cursor: pointer; padding: 4px;
    color: var(--muted); font-size: 0.8rem; border-radius: 2px;
    transition: color 0.2s, background 0.2s;
  }
  .btn-icon:hover { color: var(--accent); background: rgba(196,75,42,0.1); }
  .perf-bar-wrap { margin-top: 4px; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .perf-bar { height: 100%; border-radius: 2px; transition: width 0.4s ease; }
  .main-content { padding: 26px 30px; overflow-y: auto; max-height: calc(100vh - 68px); }
  .empty-state {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; height: 60vh; color: var(--muted);
    text-align: center; gap: 14px;
  }
  .empty-state .icon { font-size: 3rem; opacity: 0.4; }
  .empty-state p { font-size: 0.85rem; opacity: 0.7; line-height: 1.7; }
  .empty-hint {
    background: var(--aged); border: 1.5px dashed var(--border);
    border-radius: 2px; padding: 14px 22px;
    font-size: 0.78rem; color: var(--muted); line-height: 1.9;
    text-align: left; max-width: 360px;
  }
  .empty-hint code {
    font-family: 'JetBrains Mono', monospace;
    background: var(--border); padding: 1px 5px;
    border-radius: 2px; font-size: 0.75rem; color: var(--ink);
  }
  .student-header {
    display: flex; align-items: flex-start; justify-content: space-between;
    margin-bottom: 22px; padding-bottom: 16px; border-bottom: 2px solid var(--border);
  }
  .student-title { display: flex; flex-direction: column; gap: 4px; }
  .student-title h2 { font-size: 1.7rem; font-weight: 700; }
  .student-title .subtitle { font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; color: var(--muted); display: flex; gap: 8px; align-items: center; }
  .score-badges { display: flex; gap: 10px; flex-wrap: wrap; justify-content: flex-end; }
  .score-badge { display: flex; flex-direction: column; align-items: center; padding: 9px 14px; border: 2px solid; border-radius: 2px; min-width: 68px; }
  .score-badge.total { border-color: var(--accent); color: var(--accent); }
  .score-badge.correct { border-color: var(--accent2); color: var(--accent2); }
  .score-badge.rate { border-color: var(--accent3); color: var(--accent3); }
  .score-badge .val { font-family: 'JetBrains Mono', monospace; font-size: 1.4rem; font-weight: 600; }
  .score-badge .lbl { font-size: 0.58rem; letter-spacing: 0.1em; opacity: 0.8; }
  .record-form {
    background: var(--aged); border: 1.5px solid var(--border);
    border-radius: 2px; padding: 18px; margin-bottom: 22px; position: relative;
  }
  .record-form::before {
    content: '新增記錄'; position: absolute; top: -10px; left: 16px;
    background: var(--aged); padding: 0 8px;
    font-size: 0.62rem; letter-spacing: 0.15em; color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
  }
  .form-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end; }
  .form-group { display: flex; flex-direction: column; gap: 4px; }
  .form-group label { font-size: 0.68rem; letter-spacing: 0.1em; color: var(--muted); font-family: 'JetBrains Mono', monospace; }
  .form-group input, .form-group select {
    padding: 7px 10px; border: 1.5px solid var(--border);
    background: var(--paper); color: var(--ink);
    font-family: 'Noto Serif TC', serif; font-size: 0.85rem;
    border-radius: 2px; outline: none; transition: border-color 0.2s;
  }
  .form-group input:focus { border-color: var(--accent); }
  .result-toggles { display: flex; gap: 6px; }
  .diff-toggles { display: flex; gap: 6px; }
  .diff-btn {
    padding: 7px 13px; border: 1.5px solid var(--border);
    background: var(--paper); cursor: pointer;
    font-family: 'Noto Serif TC', serif; font-size: 0.82rem;
    border-radius: 2px; transition: all 0.2s; color: var(--ink);
    position: relative;
  }
  .diff-btn .diff-pts {
    display: block; font-family: 'JetBrains Mono', monospace;
    font-size: 0.55rem; color: var(--muted); margin-top: 1px; letter-spacing: 0;
  }
  .diff-btn.hard.active  { background: #7b2d2d; border-color: #7b2d2d; color: white; }
  .diff-btn.hard.active .diff-pts { color: rgba(255,255,255,0.7); }
  .diff-btn.mid.active   { background: var(--accent3); border-color: var(--accent3); color: white; }
  .diff-btn.mid.active .diff-pts { color: rgba(255,255,255,0.7); }
  .diff-btn.easy.active  { background: var(--accent2); border-color: var(--accent2); color: white; }
  .diff-btn.easy.active .diff-pts { color: rgba(255,255,255,0.7); }
  .score-preview {
    display: flex; align-items: center; gap: 6px;
    font-family: 'JetBrains Mono', monospace; font-size: 0.78rem;
    color: var(--muted); padding: 7px 0;
  }
  .score-preview .sp-val {
    font-size: 1.1rem; font-weight: 700; color: var(--accent3);
    min-width: 36px; text-align: center;
  }
  .toggle-btn {
    padding: 7px 13px; border: 1.5px solid var(--border);
    background: var(--paper); cursor: pointer;
    font-family: 'Noto Serif TC', serif; font-size: 0.82rem;
    border-radius: 2px; transition: all 0.2s; color: var(--ink);
  }
  .toggle-btn.correct.active { background: var(--accent2); border-color: var(--accent2); color: white; }
  .toggle-btn.wrong.active { background: var(--accent); border-color: var(--accent); color: white; }
  .toggle-btn.partial.active { background: var(--accent3); border-color: var(--accent3); color: white; }
  .btn-submit {
    background: var(--ink); color: var(--paper); border: none;
    padding: 8px 22px; cursor: pointer; font-family: 'Noto Serif TC', serif;
    font-size: 0.88rem; border-radius: 2px; transition: all 0.2s;
    letter-spacing: 0.05em; white-space: nowrap;
  }
  .btn-submit:hover { background: var(--accent); transform: translateY(-1px); }
  .records-title { font-size: 0.62rem; letter-spacing: 0.2em; color: var(--muted); font-family: 'JetBrains Mono', monospace; text-transform: uppercase; margin-bottom: 10px; }
  .records-list { display: flex; flex-direction: column; gap: 10px; }
  .record-card {
    background: var(--paper); border: 1.5px solid var(--border);
    border-radius: 2px; padding: 13px 15px;
    display: grid; grid-template-columns: auto 1fr auto;
    gap: 12px; align-items: start; transition: all 0.2s; animation: slideIn 0.3s ease;
  }
  @keyframes slideIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
  .record-card:hover { border-color: var(--ink); box-shadow: 3px 3px 0 var(--border); }
  .result-stamp {
    width: 38px; height: 38px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem; border: 2px solid; flex-shrink: 0; font-weight: 700;
  }
  .result-stamp.correct { border-color: var(--accent2); color: var(--accent2); background: rgba(61,122,94,0.08); }
  .result-stamp.wrong { border-color: var(--accent); color: var(--accent); background: rgba(196,75,42,0.08); }
  .result-stamp.partial { border-color: var(--accent3); color: var(--accent3); background: rgba(139,105,20,0.08); }
  .record-body { display: flex; flex-direction: column; gap: 4px; }
  .record-meta { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .record-date { font-family: 'JetBrains Mono', monospace; font-size: 0.68rem; color: var(--muted); }
  .record-subject { font-size: 0.68rem; padding: 1px 7px; background: var(--aged); border: 1px solid var(--border); border-radius: 20px; color: var(--muted); }
  .record-score-tag { font-family: 'JetBrains Mono', monospace; font-size: 0.68rem; color: var(--accent3); font-weight: 600; }
  .record-question { font-size: 0.88rem; font-weight: 600; line-height: 1.4; }
  .record-note { font-size: 0.78rem; color: var(--muted); line-height: 1.4; font-style: italic; }
  .record-actions { display: flex; gap: 4px; }
  .no-records { text-align: center; padding: 36px; color: var(--muted); font-size: 0.85rem; border: 1.5px dashed var(--border); border-radius: 2px; }
  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--ink); color: var(--paper);
    padding: 12px 20px; border-radius: 2px; font-size: 0.85rem; z-index: 500;
    border-left: 4px solid var(--accent2);
    animation: toastIn 0.3s ease, toastOut 0.3s ease 2.2s forwards;
    box-shadow: 4px 4px 0 var(--aged);
  }
  .toast.error { border-left-color: var(--accent); }
  @keyframes toastIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes toastOut { to { opacity: 0; transform: translateY(16px); } }
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(26,18,8,0.6);
    z-index: 200; display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(2px);
  }
  .modal {
    background: var(--paper); border: 2px solid var(--border);
    border-radius: 2px; padding: 26px; max-width: 440px; width: 92%;
    box-shadow: 8px 8px 0 var(--aged);
  }
  .modal h3 { font-size: 1.05rem; margin-bottom: 12px; }
  .modal p { color: var(--muted); font-size: 0.83rem; margin-bottom: 18px; line-height: 1.6; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
  .btn-danger { background: var(--accent); color: white; border: none; padding: 8px 18px; cursor: pointer; font-family: 'Noto Serif TC', serif; font-size: 0.88rem; border-radius: 2px; transition: background 0.2s; }
  .btn-danger:hover { background: #a33d21; }
  .btn-cancel { background: none; color: var(--ink); border: 1.5px solid var(--border); padding: 8px 18px; cursor: pointer; font-family: 'Noto Serif TC', serif; font-size: 0.88rem; border-radius: 2px; transition: border-color 0.2s; }
  .btn-cancel:hover { border-color: var(--ink); }
  .import-preview {
    max-height: 200px; overflow-y: auto;
    background: var(--aged); border: 1px solid var(--border);
    border-radius: 2px; padding: 10px 12px; margin-bottom: 14px;
    font-size: 0.78rem; line-height: 1.9; font-family: 'JetBrains Mono', monospace;
  }
  .import-preview .new-tag { color: var(--accent2); font-weight: 600; }
  .import-preview .dup-tag { color: var(--muted); }
  #fileInput { display: none; }
  .search-box {
    position: relative;
  }
  .search-box input {
    width: 100%; padding: 7px 10px 7px 30px;
    border: 1.5px solid var(--border);
    background: var(--paper); color: var(--ink);
    font-family: 'JetBrains Mono', monospace; font-size: 0.85rem;
    border-radius: 2px; outline: none; transition: border-color 0.2s;
    letter-spacing: 0.05em;
  }
  .search-box input:focus { border-color: var(--accent3); }
  .search-box input::placeholder { color: var(--muted); letter-spacing: 0; font-size: 0.78rem; }
  .search-box .search-icon {
    position: absolute; left: 9px; top: 50%; transform: translateY(-50%);
    font-size: 0.8rem; color: var(--muted); pointer-events: none;
  }
  .search-box .clear-btn {
    position: absolute; right: 7px; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer;
    color: var(--muted); font-size: 0.75rem; padding: 2px 4px;
    border-radius: 2px; transition: color 0.2s;
    display: none;
  }
  .search-box .clear-btn:hover { color: var(--accent); }
  .search-match-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.62rem; color: var(--muted); text-align: right;
    padding: 2px 2px 0; min-height: 14px;
  }
  .highlight { background: rgba(200,168,75,0.35); border-radius: 2px; padding: 0 1px; }

  /* Class filter tabs */
  .class-filter {
    display: flex; flex-wrap: wrap; gap: 4px;
    padding: 2px 0;
  }
  .class-tab {
    padding: 4px 10px; border: 1.5px solid var(--border);
    background: var(--paper); color: var(--muted);
    font-family: 'Noto Serif TC', serif; font-size: 0.72rem;
    border-radius: 20px; cursor: pointer; transition: all 0.15s;
    white-space: nowrap;
  }
  .class-tab:hover { border-color: var(--accent3); color: var(--accent3); }
  .class-tab.active { background: var(--accent3); border-color: var(--accent3); color: white; font-weight: 600; }
  .class-tab.all { }
  .class-tab.all.active { background: var(--ink); border-color: var(--ink); }

  /* Multi-select mode */
  .select-toolbar {
    display: none; align-items: center; justify-content: space-between;
    background: var(--ink); color: var(--paper);
    padding: 8px 10px; border-radius: 2px;
    animation: slideIn 0.2s ease;
  }
  .select-toolbar.active { display: flex; }
  .select-toolbar-left { display: flex; align-items: center; gap: 8px; }
  .select-count {
    font-family: 'JetBrains Mono', monospace; font-size: 0.75rem;
    color: var(--gold); font-weight: 600;
  }
  .btn-select-all {
    background: none; border: 1px solid var(--muted); color: var(--paper);
    padding: 3px 9px; border-radius: 2px; cursor: pointer;
    font-family: 'Noto Serif TC', serif; font-size: 0.72rem;
    transition: all 0.15s;
  }
  .btn-select-all:hover { border-color: var(--gold); color: var(--gold); }
  .btn-delete-selected {
    background: var(--accent); color: white; border: none;
    padding: 4px 11px; border-radius: 2px; cursor: pointer;
    font-family: 'Noto Serif TC', serif; font-size: 0.75rem;
    transition: background 0.15s; white-space: nowrap;
  }
  .btn-delete-selected:hover { background: #a33d21; }
  .btn-cancel-select {
    background: none; border: none; color: var(--muted);
    padding: 4px 6px; cursor: pointer; font-size: 0.8rem;
    border-radius: 2px; transition: color 0.15s;
  }
  .btn-cancel-select:hover { color: var(--paper); }

  .student-chip .chip-checkbox {
    display: none; width: 16px; height: 16px; flex-shrink: 0;
    border: 1.5px solid var(--border); border-radius: 2px;
    background: var(--paper); cursor: pointer;
    transition: all 0.15s; position: relative;
  }
  .select-mode .chip-checkbox { display: block; }
  .student-chip.selected .chip-checkbox {
    background: var(--accent); border-color: var(--accent);
  }
  .student-chip.selected .chip-checkbox::after {
    content: '✓'; position: absolute; top: -1px; left: 1px;
    font-size: 0.7rem; color: white; font-weight: 700;
  }
  .select-mode .student-chip { cursor: default; }
  .select-mode .student-chip .chip-actions { display: none; }
  .select-mode .student-chip.selected { border-color: var(--accent); background: rgba(196,75,42,0.06); }
  .select-mode .student-chip.selected::before { background: var(--accent); }

  .btn-multiselect {
    background: none; border: 1.5px solid var(--border); color: var(--muted);
    padding: 5px 9px; border-radius: 2px; cursor: pointer;
    font-family: 'JetBrains Mono', monospace; font-size: 0.68rem;
    transition: all 0.15s; white-space: nowrap;
  }
  .btn-multiselect:hover { border-color: var(--accent); color: var(--accent); }
  @media (max-width: 700px) {
    .main-layout { grid-template-columns: 1fr; }
    .sidebar { max-height: 220px; }
    .main-content { padding: 14px; }
    .score-badges { justify-content: flex-start; }
    .student-header { flex-direction: column; gap: 14px; }
  }
</style>
</head>
<body>

<header>
  <h1>📋 課堂問答記錄系統</h1>
  <span id="autoSaveLabel" style="font-family:'JetBrains Mono',monospace;font-size:0.65rem;color:rgba(200,184,154,0.5);white-space:nowrap"></span>
  <div class="header-actions">
    <button class="btn-header btn-template" onclick="downloadTemplate()">⬇ 下載範本</button>
    <button class="btn-header btn-import" onclick="document.getElementById('fileInput').click()">📂 匯入 Excel</button>
    <button class="btn-header btn-export-xlsx" onclick="exportExcel()">📊 匯出報表</button>
    <button class="btn-header btn-savedata" onclick="saveDataFile()" title="將所有資料存成備份檔">💾 儲存資料</button>
    <button class="btn-header btn-loaddata" onclick="document.getElementById('loadDataInput').click()" title="從備份檔讀取資料">📁 讀取資料</button>
    <input type="file" id="fileInput" accept=".xlsx,.xls,.csv" onchange="importExcel(event)">
    <input type="file" id="loadDataInput" accept=".json" onchange="loadDataFile(event)">
  </div>
</header>

<div class="main-layout">
  <aside class="sidebar">
    <div class="sidebar-section-title" style="display:flex;align-items:center;justify-content:space-between">
      學生名單
      <button class="btn-multiselect" id="btnMultiselect" onclick="toggleSelectMode()">☑ 多選</button>
    </div>
    <div class="class-filter" id="classFilter"></div>
    <div class="select-toolbar" id="selectToolbar">
      <div class="select-toolbar-left">
        <span class="select-count" id="selectCount">已選 0</span>
        <button class="btn-select-all" onclick="toggleSelectAll()">全選</button>
      </div>
      <div style="display:flex;gap:6px;align-items:center">
        <button class="btn-delete-selected" onclick="deleteSelected()">🗑 刪除</button>
        <button class="btn-cancel-select" onclick="toggleSelectMode()" title="取消">✕</button>
      </div>
    </div>
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input type="text" id="studentSearch" placeholder="輸入末3碼座號快速搜尋" maxlength="10" oninput="onSearch(this.value)">
      <button class="clear-btn" id="searchClear" onclick="clearSearch()">✕</button>
    </div>
    <div class="search-match-count" id="searchMatchCount"></div>
    <div class="add-student-form">
      <input type="text" id="newStudentName" placeholder="輸入學生姓名" maxlength="20">
      <button class="btn-add" onclick="addStudent()">＋</button>
    </div>
    <div class="student-list" id="studentList"></div>
  </aside>
  <main class="main-content" id="mainContent">
    <div class="empty-state">
      <div class="icon">🎓</div>
      <h3>選擇或新增學生</h3>
      <p>從左側手動新增，或點選「匯入 Excel」批次匯入名單。</p>
      <div class="empty-hint">
        <b>Excel 格式說明</b><br>
        第一欄：<code>姓名</code>（必填）<br>
        第二欄：<code>座號</code>（選填）<br>
        第三欄：<code>班級</code>（選填）<br>
        第一列為標題列，從第二列開始為學生資料。<br>
        可先點「⬇ 下載範本」取得正確格式。
      </div>
    </div>
  </main>
</div>

<!-- Delete modal -->
<div class="modal-overlay" id="deleteModal" style="display:none">
  <div class="modal">
    <h3>⚠️ 確認刪除</h3>
    <p id="deleteModalText"></p>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('deleteModal')">取消</button>
      <button class="btn-danger" id="confirmDeleteBtn">刪除</button>
    </div>
  </div>
</div>

<!-- Import preview modal -->
<div class="modal-overlay" id="importModal" style="display:none">
  <div class="modal">
    <h3>📂 確認匯入名單</h3>
    <div class="import-preview" id="importPreview"></div>
    <p id="importSummary"></p>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('importModal')">取消</button>
      <button class="btn-danger" id="confirmImportBtn" style="background:var(--accent2)">確認匯入</button>
    </div>
  </div>
</div>

<script>
let state = JSON.parse(localStorage.getItem('classroomTracker') || '{"students":[],"records":[]}');
let activeStudentId = null;
let selectedResult = 'correct';
let pendingImport = [];
let searchQuery = '';
let selectMode = false;
let selectedIds = new Set();
let selectedDiff = 'hard'; // hard / mid / easy
let activeClass = '全部';  // current class filter

// Score table: [correct, partial, wrong]
const SCORE_TABLE = { hard: [100, 80, 60], mid: [100, 80, 60], easy: [100, 80, 60] };

function save() {
  localStorage.setItem('classroomTracker', JSON.stringify(state));
  const el = document.getElementById('autoSaveLabel');
  if (el) {
    const t = new Date();
    el.textContent = `自動暫存 ${String(t.getHours()).padStart(2,'0')}:${String(t.getMinutes()).padStart(2,'0')}`;
  }
}

document.getElementById('newStudentName').addEventListener('keydown', e => { if (e.key === 'Enter') addStudent(); });
document.getElementById('studentSearch').addEventListener('keydown', e => {
  if (e.key === 'Escape') clearSearch();
  if (e.key === 'Enter') {
    // auto-select if only one match
    const matches = filteredStudents();
    if (matches.length === 1) { selectStudent(matches[0].id); clearSearch(); }
  }
});
renderClassFilter();
renderSidebar();

function onSearch(val) {
  searchQuery = val.trim();
  document.getElementById('searchClear').style.display = searchQuery ? 'block' : 'none';
  renderSidebar();
}

function clearSearch() {
  searchQuery = '';
  document.getElementById('studentSearch').value = '';
  document.getElementById('searchClear').style.display = 'none';
  document.getElementById('searchMatchCount').textContent = '';
  renderSidebar();
  document.getElementById('studentSearch').focus();
}

function getClasses() {
  const clsSet = new Set(state.students.map(s => s.cls || '').filter(Boolean));
  return ['全部', ...Array.from(clsSet).sort()];
}

function setClassFilter(cls) {
  activeClass = cls;
  // If active student no longer in view, deselect
  if (activeStudentId) {
    const s = state.students.find(s => s.id === activeStudentId);
    if (s && activeClass !== '全部' && (s.cls || '') !== activeClass) {
      activeStudentId = null;
      document.getElementById('mainContent').innerHTML = `<div class="empty-state"><div class="icon">🎓</div><h3>選擇學生</h3><p>從左側選擇學生以查看記錄。</p></div>`;
    }
  }
  renderClassFilter();
  renderSidebar();
}

function renderClassFilter() {
  const classes = getClasses();
  const el = document.getElementById('classFilter');
  if (classes.length <= 1) { el.innerHTML = ''; return; }
  el.innerHTML = classes.map(c => {
    const count = c === '全部' ? state.students.length : state.students.filter(s => (s.cls || '') === c).length;
    return `<button class="class-tab${c === '全部' ? ' all' : ''}${activeClass === c ? ' active' : ''}" onclick="setClassFilter('${c}')">${c} <span style="opacity:0.6;font-size:0.65rem">${count}</span></button>`;
  }).join('');
}

function filteredStudents() {
  let list = state.students;
  if (activeClass !== '全部') list = list.filter(s => (s.cls || '') === activeClass);
  if (!searchQuery) return list;
  const q = searchQuery.replace(/\s/g, '');
  return list.filter(s => {
    const no = String(s.no || '').replace(/\s/g, '');
    if (!no) return false;
    return no.endsWith(q) || no.includes(q);
  });
}

function highlightNo(no, query) {
  if (!query || !no) return no || '';
  const idx = no.lastIndexOf(query);
  if (idx < 0) return no;
  return no.slice(0, idx) + `<span class="highlight">${no.slice(idx, idx + query.length)}</span>` + no.slice(idx + query.length);
}

function toast(msg, type = 'ok') {
  const el = document.createElement('div');
  el.className = 'toast' + (type === 'error' ? ' error' : '');
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2600);
}

function closeModal(id) { document.getElementById(id).style.display = 'none'; }

// ── Download template ──
function downloadTemplate() {
  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.aoa_to_sheet([
    ['姓名', '座號', '班級'],
    ['王小明', '1', '三年甲班'],
    ['李小花', '2', '三年甲班'],
    ['陳大偉', '3', '三年甲班'],
  ]);
  ws['!cols'] = [{wch:14},{wch:8},{wch:14}];
  XLSX.utils.book_append_sheet(wb, ws, '學生名單');
  XLSX.writeFile(wb, '學生名單範本.xlsx');
  toast('範本已下載 📄');
}

// ── Import Excel ──
function importExcel(event) {
  const file = event.target.files[0];
  event.target.value = '';
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const wb = XLSX.read(new Uint8Array(e.target.result), { type: 'array' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
      if (rows.length < 2) { toast('檔案內容為空或格式錯誤', 'error'); return; }

      const header = rows[0].map(h => String(h).trim());
      let nameCol = header.findIndex(h => h.includes('姓名') || h.toLowerCase().includes('name'));
      if (nameCol < 0) nameCol = 0;
      const noCol = header.findIndex(h => h.includes('座號') || h.includes('號'));
      const classCol = header.findIndex(h => h.includes('班級') || h.includes('班'));

      const candidates = [];
      for (let i = 1; i < rows.length; i++) {
        const row = rows[i];
        const name = String(row[nameCol] || '').trim();
        if (!name) continue;
        const no = noCol >= 0 ? String(row[noCol] || '').trim() : '';
        const cls = classCol >= 0 ? String(row[classCol] || '').trim() : '';
        const isDup = state.students.some(s => (s.rawName || s.name) === name);
        candidates.push({ name, no, cls, isDup });
      }
      if (candidates.length === 0) { toast('找不到有效的學生姓名', 'error'); return; }

      const newCount = candidates.filter(c => !c.isDup).length;
      const dupCount = candidates.filter(c => c.isDup).length;

      document.getElementById('importPreview').innerHTML = candidates.map(c =>
        c.isDup
          ? `<div class="dup-tag">— ${c.name}${c.no?' ('+c.no+')':''}${c.cls?' · '+c.cls:''} （已存在，跳過）</div>`
          : `<div class="new-tag">＋ ${c.name}${c.no?' ('+c.no+')':''}${c.cls?' · '+c.cls:''}</div>`
      ).join('');

      document.getElementById('importSummary').textContent =
        `共讀取 ${candidates.length} 筆，將新增 ${newCount} 位學生，略過 ${dupCount} 位重複。`;

      pendingImport = candidates.filter(c => !c.isDup);
      document.getElementById('confirmImportBtn').onclick = () => {
        pendingImport.forEach(c => {
          const displayName = c.no ? `[${c.no}] ${c.name}` : c.name;
          state.students.push({
            id: Date.now() + Math.random(),
            name: displayName, rawName: c.name,
            no: c.no, cls: c.cls,
            createdAt: new Date().toISOString()
          });
        });
        save(); renderClassFilter(); renderSidebar(); closeModal('importModal');
        toast(`成功匯入 ${pendingImport.length} 位學生 ✓`);
      };
      document.getElementById('importModal').style.display = 'flex';
    } catch (err) {
      toast('檔案讀取失敗，請確認格式正確', 'error');
    }
  };
  reader.readAsArrayBuffer(file);
}

// ── Save / Load data file ──
function saveDataFile() {
  const payload = {
    _version: 1,
    _savedAt: new Date().toISOString(),
    _app: '課堂問答記錄系統',
    students: state.students,
    records: state.records
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const d = new Date();
  const ds = `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
  a.href = url;
  a.download = `課堂記錄備份_${ds}.json`;
  a.click();
  URL.revokeObjectURL(url);
  toast(`已儲存備份（${state.students.length} 位學生，${state.records.length} 筆記錄）💾`);
}

function loadDataFile(event) {
  const file = event.target.files[0];
  event.target.value = '';
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.students || !data.records) { toast('檔案格式不正確', 'error'); return; }
      const newStudents = data.students.length;
      const newRecords = data.records.length;
      document.getElementById('deleteModalText').innerHTML =
        `確定要從備份檔讀取資料嗎？<br><br>` +
        `備份時間：<b>${data._savedAt ? new Date(data._savedAt).toLocaleString('zh-TW') : '不明'}</b><br>` +
        `學生人數：<b>${newStudents} 位</b>，問答記錄：<b>${newRecords} 筆</b><br><br>` +
        `<span style="color:var(--accent)">⚠ 這將覆蓋目前所有資料，無法復原。</span>`;
      document.getElementById('confirmDeleteBtn').textContent = '確認讀取';
      document.getElementById('confirmDeleteBtn').style.background = '#6b7fd4';
      document.getElementById('confirmDeleteBtn').onclick = () => {
        state.students = data.students;
        state.records = data.records;
        save();
        activeStudentId = null;
        activeClass = '全部';
        searchQuery = '';
        document.getElementById('studentSearch').value = '';
        document.getElementById('mainContent').innerHTML = `<div class="empty-state"><div class="icon">🎓</div><h3>選擇學生</h3><p>資料已成功載入，請從左側選擇學生。</p></div>`;
        renderClassFilter();
        renderSidebar();
        closeModal('deleteModal');
        document.getElementById('confirmDeleteBtn').textContent = '刪除';
        document.getElementById('confirmDeleteBtn').style.background = '';
        toast(`已載入 ${newStudents} 位學生、${newRecords} 筆記錄 ✓`);
      };
      document.getElementById('deleteModal').style.display = 'flex';
    } catch(err) {
      toast('讀取失敗，請確認為有效的備份檔', 'error');
    }
  };
  reader.readAsText(file);
}

// ── Export Excel ──
function exportExcel() {
  if (state.students.length === 0) { toast('尚無學生資料可匯出', 'error'); return; }
  const wb = XLSX.utils.book_new();

  // Sheet 1: Summary
  const summaryRows = [['姓名', '座號', '班級', '總問答次數', '完全正確', '部分正確', '回答錯誤', '表現指數(%)']];
  state.students.forEach(s => {
    const st = studentStats(s.id);
    summaryRows.push([s.rawName || s.name, s.no||'', s.cls||'', st.total, st.correct, st.partial, st.wrong, st.rate]);
  });
  const ws1 = XLSX.utils.aoa_to_sheet(summaryRows);
  ws1['!cols'] = [{wch:14},{wch:8},{wch:14},{wch:12},{wch:10},{wch:10},{wch:10},{wch:14}];
  XLSX.utils.book_append_sheet(wb, ws1, '學生成績總覽');

  // Sheet 2: All records
  const resultMap = { correct:'完全正確', wrong:'回答錯誤', partial:'部分正確' };
  const recRows = [['學生姓名', '日期', '科目', '問題內容', '表現結果', '給分', '備註']];
  state.records.forEach(r => {
    const s = state.students.find(st => st.id === r.studentId);
    recRows.push([s ? (s.rawName||s.name) : '', r.date, r.subject||'', r.question, resultMap[r.result]||r.result, r.score!==null?r.score:'', r.note||'']);
  });
  const ws2 = XLSX.utils.aoa_to_sheet(recRows);
  ws2['!cols'] = [{wch:14},{wch:12},{wch:10},{wch:32},{wch:12},{wch:8},{wch:24}];
  XLSX.utils.book_append_sheet(wb, ws2, '問答詳細記錄');

  const d = new Date();
  const ds = `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
  XLSX.writeFile(wb, `課堂問答記錄_${ds}.xlsx`);
  toast('報表已匯出 📊');
}

// ── Students ──
function addStudent() {
  const input = document.getElementById('newStudentName');
  const name = input.value.trim();
  if (!name) return;
  if (state.students.find(s => s.name === name)) { toast('已有同名學生！', 'error'); return; }
  const student = { id: Date.now(), name, createdAt: new Date().toISOString() };
  state.students.push(student);
  save(); input.value = '';
  renderClassFilter(); renderSidebar(); selectStudent(student.id);
}

function deleteStudent(id) {
  const s = state.students.find(s => s.id === id);
  document.getElementById('deleteModalText').textContent = `確定要刪除學生「${s.name}」及其所有記錄嗎？此操作無法復原。`;
  document.getElementById('confirmDeleteBtn').onclick = () => {
    state.students = state.students.filter(s => s.id !== id);
    state.records = state.records.filter(r => r.studentId !== id);
    save();
    if (activeStudentId === id) {
      activeStudentId = null;
      document.getElementById('mainContent').innerHTML = `<div class="empty-state"><div class="icon">🎓</div><h3>選擇學生</h3><p>從左側選擇學生以查看記錄。</p></div>`;
    }
    renderClassFilter(); renderSidebar(); closeModal('deleteModal'); toast('已刪除');
  };
  document.getElementById('deleteModal').style.display = 'flex';
}

function selectStudent(id) {
  activeStudentId = id; selectedResult = 'correct';
  renderSidebar(); renderMain();
}

function studentStats(id) {
  const records = state.records.filter(r => r.studentId === id);
  const total = records.length;
  const correct = records.filter(r => r.result === 'correct').length;
  const partial = records.filter(r => r.result === 'partial').length;
  const wrong = records.filter(r => r.result === 'wrong').length;
  const rate = total ? Math.round((correct + partial * 0.5) / total * 100) : 0;
  return { total, correct, partial, wrong, rate };
}

// ── Records ──
function addRecord() {
  const idx = { correct: 0, partial: 1, wrong: 2 }[selectedResult];
  const autoScore = SCORE_TABLE[selectedDiff][idx];
  const diffLabel = { hard:'難題', mid:'中等', easy:'易題' }[selectedDiff];
  const resultLabel = { correct:'正確', partial:'部分正確', wrong:'錯誤' }[selectedResult];
  const subject = document.getElementById('subjectInput').value.trim();
  const question = `${subject ? subject + '・' : ''}${diffLabel}（${resultLabel}）`;
  state.records.unshift({
    id: Date.now(), studentId: activeStudentId, question,
    note: document.getElementById('noteInput').value.trim(),
    subject,
    score: autoScore,
    difficulty: selectedDiff,
    result: selectedResult,
    date: document.getElementById('dateInput').value || new Date().toISOString().slice(0,10),
    createdAt: new Date().toISOString()
  });
  save();
  document.getElementById('noteInput').value = '';
  renderSidebar(); renderMain();
}

function deleteRecord(id) {
  document.getElementById('deleteModalText').textContent = '確定要刪除這筆記錄嗎？';
  document.getElementById('confirmDeleteBtn').onclick = () => {
    state.records = state.records.filter(r => r.id !== id);
    save(); renderSidebar(); renderMain(); closeModal('deleteModal'); toast('已刪除');
  };
  document.getElementById('deleteModal').style.display = 'flex';
}

function setResult(val) {
  selectedResult = val;
  document.querySelectorAll('.toggle-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.val === val));
  refreshScorePreview();
}

function setDiff(val) {
  selectedDiff = val;
  document.querySelectorAll('.diff-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.diff === val));
  refreshScorePreview();
}

function refreshScorePreview() {
  const el = document.getElementById('scorePreview');
  if (!el) return;
  const idx = { correct: 0, partial: 1, wrong: 2 }[selectedResult];
  const pts = SCORE_TABLE[selectedDiff][idx];
  el.innerHTML = `自動給分：<span class="sp-val">${pts}</span> 分`;
}

// ── Multi-select ──
function toggleSelectMode() {
  selectMode = !selectMode;
  selectedIds.clear();
  const toolbar = document.getElementById('selectToolbar');
  const btn = document.getElementById('btnMultiselect');
  toolbar.classList.toggle('active', selectMode);
  btn.style.display = selectMode ? 'none' : '';
  renderSidebar();
}

function toggleChip(id) {
  if (selectedIds.has(id)) selectedIds.delete(id);
  else selectedIds.add(id);
  updateSelectCount();
  renderSidebar();
}

function toggleSelectAll() {
  const filtered = filteredStudents();
  const allSelected = filtered.every(s => selectedIds.has(s.id));
  filtered.forEach(s => allSelected ? selectedIds.delete(s.id) : selectedIds.add(s.id));
  updateSelectCount();
  renderSidebar();
}

function updateSelectCount() {
  document.getElementById('selectCount').textContent = `已選 ${selectedIds.size}`;
}

function deleteSelected() {
  if (selectedIds.size === 0) { toast('請先勾選要刪除的學生', 'error'); return; }
  const names = state.students.filter(s => selectedIds.has(s.id)).map(s => s.rawName || s.name);
  document.getElementById('deleteModalText').textContent =
    `確定要刪除 ${selectedIds.size} 位學生（${names.slice(0,3).join('、')}${names.length > 3 ? '…等' : ''}）及其所有記錄嗎？此操作無法復原。`;
  document.getElementById('confirmDeleteBtn').onclick = () => {
    const toDelete = new Set(selectedIds);
    state.students = state.students.filter(s => !toDelete.has(s.id));
    state.records = state.records.filter(r => !toDelete.has(r.studentId));
    if (toDelete.has(activeStudentId)) {
      activeStudentId = null;
      document.getElementById('mainContent').innerHTML = `<div class="empty-state"><div class="icon">🎓</div><h3>選擇學生</h3><p>從左側選擇學生以查看記錄。</p></div>`;
    }
    save();
    selectedIds.clear();
    selectMode = false;
    document.getElementById('selectToolbar').classList.remove('active');
    document.getElementById('btnMultiselect').style.display = '';
    renderClassFilter(); renderSidebar();
    closeModal('deleteModal');
    toast(`已刪除 ${toDelete.size} 位學生`);
  };
  document.getElementById('deleteModal').style.display = 'flex';
}

// ── Render ──
function renderSidebar() {
  const list = document.getElementById('studentList');
  const countEl = document.getElementById('searchMatchCount');
  const filtered = filteredStudents();

  if (!state.students.length) {
    list.innerHTML = '<div style="text-align:center;color:var(--muted);font-size:0.78rem;padding:18px 0;opacity:0.6;">尚無學生<br><small>手動新增或匯入 Excel</small></div>';
    countEl.textContent = '';
    return;
  }

  if (searchQuery && filtered.length === 0) {
    list.innerHTML = '<div style="text-align:center;color:var(--muted);font-size:0.78rem;padding:18px 0;opacity:0.6;">查無符合的學生</div>';
    countEl.textContent = `0 / ${state.students.length} 位`;
    return;
  }

  countEl.textContent = searchQuery ? `符合 ${filtered.length} / ${state.students.length} 位` : '';

  const allSelected = filtered.length > 0 && filtered.every(s => selectedIds.has(s.id));
  if (selectMode) {
    document.querySelector('.btn-select-all').textContent = allSelected ? '取消全選' : '全選';
    updateSelectCount();
  }

  list.className = 'student-list' + (selectMode ? ' select-mode' : '');

  list.innerHTML = filtered.map(s => {
    const stats = studentStats(s.id);
    const active = s.id === activeStudentId;
    const checked = selectedIds.has(s.id);
    const barColor = stats.rate >= 70 ? 'var(--accent2)' : stats.rate >= 40 ? 'var(--accent3)' : 'var(--accent)';
    const noDisplay = s.no ? highlightNo(s.no, searchQuery) : '';
    const nameDisplay = s.rawName || s.name;
    const clickHandler = selectMode
      ? `onclick="toggleChip(${s.id})"`
      : `onclick="selectStudent(${s.id})"`;
    return `<div class="student-chip${active && !selectMode ? ' active' : ''}${checked ? ' selected' : ''}" ${clickHandler}>
      <div class="chip-checkbox"></div>
      <div class="student-chip-info" style="flex:1;min-width:0">
        <div class="student-name">${nameDisplay}${noDisplay ? ' <span style="font-family:\'JetBrains Mono\',monospace;font-size:0.72rem;color:var(--muted)">#'+noDisplay+'</span>' : ''}</div>
        <div class="student-stats">${stats.total} 次問答 · 正確率 ${stats.rate}%</div>
        <div class="perf-bar-wrap"><div class="perf-bar" style="width:${stats.rate}%;background:${barColor}"></div></div>
      </div>
      <div class="chip-actions">
        <button class="btn-icon" onclick="event.stopPropagation();deleteStudent(${s.id})" title="刪除">✕</button>
      </div>
    </div>`;
  }).join('');
}

function renderMain() {
  if (!activeStudentId) return;
  const student = state.students.find(s => s.id === activeStudentId);
  if (!student) return;
  const stats = studentStats(student.id);
  const records = state.records.filter(r => r.studentId === activeStudentId);
  const today = new Date().toISOString().slice(0,10);
  const rl = { correct:'✓', wrong:'✕', partial:'△' };
  const rn = { correct:'完全正確', wrong:'回答錯誤', partial:'部分正確' };
  const rc = { correct:'correct', wrong:'wrong', partial:'partial' };

  document.getElementById('mainContent').innerHTML = `
    <div class="student-header">
      <div class="student-title">
        <h2>${student.rawName || student.name}${student.no ? ' <span style="font-size:1rem;color:var(--muted)">#'+student.no+'</span>' : ''}</h2>
        <div class="subtitle">
          加入：${new Date(student.createdAt).toLocaleDateString('zh-TW')}
          ${student.cls ? '<span style="background:var(--aged);border:1px solid var(--border);padding:1px 8px;border-radius:12px">'+student.cls+'</span>' : ''}
        </div>
      </div>
      <div class="score-badges">
        <div class="score-badge total"><span class="val">${stats.total}</span><span class="lbl">總次數</span></div>
        <div class="score-badge correct"><span class="val">${stats.correct}</span><span class="lbl">完全正確</span></div>
        <div class="score-badge rate"><span class="val">${stats.rate}%</span><span class="lbl">表現指數</span></div>
      </div>
    </div>
    <div class="record-form">
      <div class="form-row" style="align-items:center">
        <div class="form-group">
          <label>題目難度</label>
          <div class="diff-toggles">
            <button class="diff-btn hard active" data-diff="hard" onclick="setDiff('hard')">難<span class="diff-pts">正確100分</span></button>
            <button class="diff-btn mid" data-diff="mid" onclick="setDiff('mid')">中<span class="diff-pts">正確100分</span></button>
            <button class="diff-btn easy" data-diff="easy" onclick="setDiff('easy')">易<span class="diff-pts">正確100分</span></button>
          </div>
        </div>
        <div class="form-group">
          <label>表現結果</label>
          <div class="result-toggles">
            <button class="toggle-btn correct active" data-val="correct" onclick="setResult('correct')">✓ 正確</button>
            <button class="toggle-btn partial" data-val="partial" onclick="setResult('partial')">△ 部分</button>
            <button class="toggle-btn wrong" data-val="wrong" onclick="setResult('wrong')">✕ 錯誤</button>
          </div>
        </div>
        <div class="form-group">
          <label>&nbsp;</label>
          <div class="score-preview" id="scorePreview">自動給分：<span class="sp-val">100</span> 分</div>
        </div>
        <div class="form-group">
          <label>日期</label>
          <input type="date" id="dateInput" value="${today}" style="min-width:108px">
        </div>
        <div class="form-group" style="min-width:90px">
          <label>科目</label>
          <input type="text" id="subjectInput" placeholder="例：數學">
        </div>
        <div class="form-group" style="flex:1;min-width:110px">
          <label>備註</label>
          <input type="text" id="noteInput" placeholder="老師備註（可留空）">
        </div>
        <div class="form-group" style="justify-content:flex-end">
          <label>&nbsp;</label>
          <button class="btn-submit" onclick="addRecord()">記錄 →</button>
        </div>
      </div>
    </div>
    <div class="records-title">問答記錄 (${records.length})</div>
    <div class="records-list">
      ${!records.length
        ? '<div class="no-records">尚無記錄，開始新增第一筆問答紀錄吧！</div>'
        : records.map(r => {
          const diffLabel = { hard:'難', mid:'中', easy:'易' }[r.difficulty] || '';
          const diffColor = { hard:'#7b2d2d', mid:'var(--accent3)', easy:'var(--accent2)' }[r.difficulty] || 'var(--muted)';
          return `
          <div class="record-card">
            <div class="result-stamp ${rc[r.result]}">${rl[r.result]}</div>
            <div class="record-body">
              <div class="record-meta">
                <span class="record-date">${r.date}</span>
                ${r.subject?`<span class="record-subject">${r.subject}</span>`:''}
                ${diffLabel?`<span style="font-size:0.65rem;padding:1px 7px;border-radius:20px;border:1px solid ${diffColor};color:${diffColor}">${diffLabel}</span>`:''}
                ${r.score!==null?`<span class="record-score-tag">${r.score}分</span>`:''}
                <span style="font-size:0.68rem;color:${r.result==='correct'?'var(--accent2)':r.result==='partial'?'var(--accent3)':'var(--accent)'}">${rn[r.result]}</span>
              </div>
              <div class="record-question">${r.question}</div>
              ${r.note?`<div class="record-note">📝 ${r.note}</div>`:''}
            </div>
            <div class="record-actions">
              <button class="btn-icon" onclick="deleteRecord(${r.id})" title="刪除">✕</button>
            </div>
          </div>`;
        }).join('')}
    </div>
  `;
  setResult(selectedResult);
  setDiff(selectedDiff);
  refreshScorePreview();
}

// ── Service Worker ──
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => console.log('SW registered:', reg.scope))
      .catch(err => console.warn('SW failed:', err));
  });
}
</script>
</body>
</html>

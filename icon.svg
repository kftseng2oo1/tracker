<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" fill="#1a1208"/>

  <!-- Red border frame -->
  <rect x="10" y="10" width="492" height="492" fill="none" stroke="#c44b2a" stroke-width="14" rx="4"/>

  <!-- Paper area -->
  <rect x="64" y="64" width="384" height="384" fill="#f5f0e8" rx="2"/>

  <!-- Ruled lines -->
  <line x1="100" y1="160" x2="412" y2="160" stroke="#c8b89a" stroke-width="5"/>
  <line x1="100" y1="210" x2="412" y2="210" stroke="#c8b89a" stroke-width="5"/>
  <line x1="100" y1="260" x2="412" y2="260" stroke="#c8b89a" stroke-width="5"/>
  <line x1="100" y1="310" x2="412" y2="310" stroke="#c8b89a" stroke-width="5"/>

  <!-- Pencil body -->
  <polygon points="220,110 292,110 292,330 256,370 220,330" fill="#c44b2a"/>

  <!-- Pencil tip (gold) -->
  <polygon points="220,330 256,370 292,330" fill="#c8a84b"/>

  <!-- Pencil eraser top -->
  <rect x="220" y="95" width="72" height="20" fill="#8a7a6a" rx="2"/>
  <rect x="220" y="108" width="72" height="6" fill="#c8b89a"/>

  <!-- Pencil highlight sheen -->
  <rect x="228" y="115" width="14" height="200" fill="rgba(255,255,255,0.12)" rx="3"/>
</svg>
